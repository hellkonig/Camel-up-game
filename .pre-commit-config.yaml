repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run ruff check --fix .
        language: system
        pass_filenames: false

      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format .
        language: system
        pass_filenames: false

      - id: mypy
        name: MyPy
        entry: uv run python -m mypy
        language: system
        pass_filenames: false
